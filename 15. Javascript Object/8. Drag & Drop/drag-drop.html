<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop</title>
    <script defer src="drag-drop.js"></script>
    <style>
        #draggable{
            width:100px;
            height:100px;
            background:red;
            position:absolute;
            cursor:move;
        }
    </style>
</head>
<body>
    <h1>JavaScript Drag & Drop</h1>
    <div id="draggable">Drag Me!</div>
</body>
</html>
