<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete DOM Manipulation Example</title>
</head>
<body>
    <h1>DOM Manipulation (All-in-One Example)</h1>

    <!-- Paragraph selected by ID -->
    <p id="demo">Paragraph with ID "demo"</p>

    <!-- Paragraphs selected by class -->
    <p class="item">First paragraph with class "item"</p>
    <p class="item">Second paragraph with class "item"</p>
    <p class="item">Third paragraph with class "item"</p>

    <!-- Button to trigger JavaScript function -->
    <button onclick="updateText()">Click to Change Text</button>

    <script src="dom.js"></script>
</body>
</html>
